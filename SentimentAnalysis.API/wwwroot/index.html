<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment AI | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #a855f7;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1100px;
            padding: 20px;
            width: 100%;
        }

        .header-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        .main-title {
            font-weight: 800;
            font-size: 3.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 2.5rem;
            transition: all 0.4s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

            .glass-card:hover {
                transform: translateY(-10px);
                border-color: var(--primary-color);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            }

        .step-badge {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }

        .form-control, .form-select {
            background: rgba(15, 23, 42, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 1rem;
            max-width: 300px;
            text-align: center;
        }

        .btn-custom {
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 250px;
            text-transform: uppercase;
        }

        .btn-primary-gradient {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
        }

        .status-msg {
            margin-top: 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            min-height: 24px;
        }

        .result-display {
            margin-top: 1.5rem;
            padding: 15px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1.4rem;
            display: none;
            width: 100%;
            max-width: 300px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h1 class="main-title"><i class="fas fa-brain me-2"></i> Sentiment AI</h1>
            <p class="text-secondary">Yapay Zeka ile Metinlerin Duygu Dünyasını Keşfedin</p>
        </div>
        <div class="row g-4 justify-content-center">
            <div class="col-md-4">
                <div class="glass-card">
                    <div class="step-badge">1</div>
                    <h5 class="mb-3">Veri Kaynağı</h5>
                    <input type="file" id="csvFile" class="form-control">
                    <button onclick="uploadFile()" class="btn btn-outline-light btn-custom">Yükle</button>
                    <div id="uploadStatus" class="status-msg"></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card">
                    <div class="step-badge">2</div>
                    <h5 class="mb-3">Model Eğitimi</h5>
                    <select id="algorithm" class="form-select"><option value="svm">SVM</option><option value="naive_bayes">Naive Bayes</option></select>
                    <button onclick="trainModel()" class="btn btn-primary-gradient btn-custom">Eğit</button>
                    <div id="trainStatus" class="status-msg"></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card">
                    <div class="step-badge">3</div>
                    <h5 class="mb-3">Analiz Merkezi</h5>
                    <textarea id="analyzeText" class="form-control" rows="2" placeholder="Metin girin..."></textarea>
                    <button onclick="analyzeSentiment()" class="btn btn-success btn-custom" style="background-color: #10b981; border:none;">Analiz Et</button>
                    <div id="resultDisplay" class="result-display"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('csvFile');
            const status = document.getElementById('uploadStatus');
            if (!fileInput.files[0]) return;
            status.innerHTML = 'Yükleniyor...';
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            try {
                const res = await fetch('/corpus/upload', { method: 'POST', body: formData });
                status.innerHTML = res.ok ? '✅ Yüklendi' : '❌ Hata';
            } catch (e) { status.innerHTML = '❌ Hata'; }
        }

        async function trainModel() {
            const status = document.getElementById('trainStatus');
            status.innerHTML = 'Eğitiliyor...';
            try {
                const res = await fetch('/model/train?corpusPath=Uploads/temiz_veri (1).csv', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ algorithm: document.getElementById('algorithm').value, nGramRange: 1, minFrequency: 1 })
                });
                status.innerHTML = res.ok ? '✅ Eğitildi' : '❌ Hata';
            } catch (e) { status.innerHTML = '❌ Hata'; }
        }

        async function analyzeSentiment() {
            const text = document.getElementById('analyzeText').value;
            const display = document.getElementById('resultDisplay');
            if (!text) return;

            display.style.display = 'block';
            display.innerHTML = '...';

            try {
                const res = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const result = await res.json();
                console.log("Analiz Çıktısı:", result);

                // Görüntüdeki JSON yapısına göre düzeltilmiş güvenli okuma
                let rawData = result.data || result.Data;
                // DİKKAT: API'den gelen anahtar "predicatedLabel"
                let label = (rawData.predicatedLabel || rawData.PredicatedLabel || "").toLowerCase();

                if (label.includes('posit')) {
                    display.innerHTML = '😊 POZİTİF';
                    display.style.cssText = 'display:block; background:rgba(16,185,129,0.2); color:#10b981; border:1px solid #10b981;';
                } else if (label.includes('negat')) {
                    display.innerHTML = '🙁 NEGATİF';
                    display.style.cssText = 'display:block; background:rgba(239,68,68,0.2); color:#ef4444; border:1px solid #ef4444;';
                } else {
                    display.innerHTML = '❓ Bilinmiyor: ' + label;
                    display.style.cssText = 'display:block; background:rgba(255,255,255,0.1); color:white; border:1px solid white;';
                }
            } catch (e) {
                display.innerHTML = '❌ Hata!';
            }
        }
    </script>
</body>
</html>
